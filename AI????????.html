function safe(v, fb) { return (v===null||v===undefined||v==="") ? (fb||"") : v; }
function sc(s) {
  if(!s) return "wait";
  if(s==="已完成") return "done";
  if(s==="进行中") return "go";
  if(s==="规划中") return "plan";
  return "wait";
}
function st(s) { return s||"待启动"; }
function bc(p) {
  var n = parseInt(p);
  if(isNaN(n)) return "gold";
  if(n>=80) return "gold";
  if(n>=50) return "blue";
  if(n>=20) return "orange";
  return "red";
}
