<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《投掷》第1-4集 分镜本</title>
<style>
  :root {
    --ep1: #e74c3c;
    --ep1-bg: #fdf2f2;
    --ep2: #2980b9;
    --ep2-bg: #f0f7fc;
    --ep3: #27ae60;
    --ep3-bg: #f0faf4;
    --ep4: #8e44ad;
    --ep4-bg: #f8f0fc;
    --header-height: 60px;
    --tab-height: 48px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    padding-top: var(--header-height);
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #1a1a2e; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-height);
    background: linear-gradient(135deg, #16213e, #0f3460);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .header h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, #e94560, #ffd700);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 2px;
  }
  .header .subtitle { font-size: 12px; color: #888; letter-spacing: 1px; }
  .header .meta { display: flex; gap: 20px; font-size: 12px; color: #aaa; }
  .stat-badge {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.1); padding: 4px 12px;
    border-radius: 12px; font-size: 12px;
  }
  .ep-tabs {
    position: fixed; top: var(--header-height); left: 0; right: 0; z-index: 99;
    height: var(--tab-height);
    display: flex; background: #12122a;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    overflow-x: auto;
  }
  .ep-tabs .tab {
    flex-shrink: 0; padding: 0 28px;
    height: var(--tab-height);
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 600;
    color: #666; cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s; user-select: none;
  }
  .ep-tabs .tab:hover { color: #aaa; background: rgba(255,255,255,0.03); }
  .ep-tabs .tab.active { color: #fff; }
  .ep-tabs .tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .ep-tabs .tab .scene-count { font-size: 11px; color: #666; font-weight: 400; }
  .scene-bar {
    position: fixed; top: calc(var(--header-height) + var(--tab-height));
    left: 0; right: 0; z-index: 98;
    height: 36px; display: none; align-items: center;
    background: #16163a;
    padding: 0 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    overflow-x: auto;
  }
  .scene-bar.visible { display: flex; }
  .scene-bar .scene-btn {
    flex-shrink: 0; padding: 4px 14px;
    font-size: 12px; color: #888; cursor: pointer;
    border-radius: 4px; border: 1px solid transparent;
    transition: all 0.2s; white-space: nowrap;
  }
  .scene-bar .scene-btn:hover { color: #ccc; background: rgba(255,255,255,0.05); }
  .scene-bar .scene-btn.active { color: #fff; border-color: #e94560; background: rgba(233,69,96,0.15); }
  .content {
    padding-top: calc(var(--tab-height) + 36px + 16px);
    padding-left: 16px; padding-right: 16px; padding-bottom: 60px;
    max-width: 1400px; margin: 0 auto;
  }
  .episode { display: none; }
  .episode.active { display: block; }
  .scene { display: none; }
  .scene.active { display: block; }
  .scene-header {
    background: rgba(255,255,255,0.04);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 16px;
    border-left: 4px solid #e94560;
    display: flex; flex-wrap: wrap; gap: 16px; align-items: center;
  }
  .scene-header .scene-id { font-size: 14px; font-weight: 700; color: #e94560; }
  .scene-header .info { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: #bbb; }
  .scene-header .info span { display: flex; align-items: center; gap: 4px; }
  .scene-header .info .label { color: #666; }
  .scene-header .desc { width: 100%; margin-top: 4px; font-size: 13px; color: #999; line-height: 1.6; }
  .shot-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
  .shot-table thead th {
    position: sticky; top: calc(var(--header-height) + var(--tab-height) + 36px);
    z-index: 10; background: #1a1a2e;
    padding: 8px 10px; font-size: 11px; color: #666;
    text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    white-space: nowrap; text-align: left;
  }
  .shot-table th.id { width: 50px; text-align: center; }
  .shot-table th.type { width: 60px; text-align: center; }
  .shot-table th.cam { width: 80px; text-align: center; }
  .shot-table th.dur { width: 50px; text-align: center; }
  .shot-table th.action { min-width: 240px; }
  .shot-table th.dialog { min-width: 180px; }
  .shot-table th.notes { min-width: 120px; }
  .shot-table tbody tr { background: rgba(255,255,255,0.03); border-radius: 6px; transition: background 0.15s; }
  .shot-table tbody tr:hover { background: rgba(255,255,255,0.06); }
  .shot-table tbody td { padding: 10px; font-size: 13px; line-height: 1.5; vertical-align: top; }
  .shot-table td.id { text-align: center; color: #e94560; font-weight: 700; font-size: 12px; width: 50px; }
  .shot-table td.type { text-align: center; width: 60px; }
  .shot-table td.cam { text-align: center; width: 80px; }
  .shot-table td.dur { text-align: center; width: 50px; color: #ffd700; font-weight: 600; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-ls { background: #2d3436; color: #ddd; }
  .badge-fs { background: #636e72; color: #fff; }
  .badge-ms { background: #0984e3; color: #fff; }
  .badge-mcu { background: #6c5ce7; color: #fff; }
  .badge-cu { background: #e17055; color: #fff; }
  .badge-ecu { background: #d63031; color: #fff; }
  .cam-badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .cam-fixed { background: #2d3436; color: #aaa; }
  .cam-push { background: #0984e3; color: #fff; }
  .cam-pull { background: #6c5ce7; color: #fff; }
  .cam-pan { background: #00b894; color: #fff; }
  .cam-track { background: #e17055; color: #fff; }
  .cam-follow { background: #d63031; color: #fff; }
  .cam-shake { background: #f39c12; color: #333; }
  .dialog { color: #fdcb6e; font-style: italic; }
  .vo { color: #74b9ff; font-style: italic; }
  .notes { color: #888; font-size: 12px; }
  .scene-break {
    display: flex; align-items: center; justify-content: center;
    padding: 20px 0; gap: 12px;
    color: #444; font-size: 12px; letter-spacing: 2px;
  }
  .scene-break::before, .scene-break::after {
    content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
  }
  .total-bar {
    background: rgba(255,255,255,0.03);
    border-radius: 8px; padding: 16px 20px; margin-top: 20px;
    display: flex; flex-wrap: wrap; gap: 20px;
    font-size: 13px; color: #999;
  }
  .total-bar strong { color: #ffd700; font-size: 18px; }
  @media (max-width: 768px) {
    .header h1 { font-size: 15px; }
    .header .meta { display: none; }
    .ep-tabs .tab { padding: 0 14px; font-size: 12px; }
    .scene-bar { padding: 0 8px; gap: 4px; }
    .scene-bar .scene-btn { padding: 4px 8px; font-size: 11px; }
    .content { padding-left: 8px; padding-right: 8px; }
    .shot-table thead th { font-size: 10px; padding: 4px; }
    .shot-table tbody td { padding: 6px; font-size: 12px; }
    .shot-table th.action { min-width: 120px; }
    .shot-table th.dialog { min-width: 100px; }
    .shot-table th.notes { min-width: 80px; }
    .scene-header { padding: 12px; }
    .scene-header .info { gap: 8px; font-size: 12px; }
  }
  @media print {
    body { background: #fff; color: #333; padding-top: 0; }
    .header, .ep-tabs, .scene-bar { position: static; }
    .episode { display: block !important; }
    .scene { display: block !important; }
    .ep-tabs .tab { display: none; }
    .scene-bar { display: none; }
    .content { padding-top: 0; }
    .shot-table thead th { position: static; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .shot-table tbody tr { animation: fadeIn 0.3s ease forwards; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>《投掷》第1-4集 · 分镜本</h1>
    <div class="subtitle">SHORT DRAMA STORYBOARD · 短剧节奏版</div>
  </div>
  <div class="meta">
    <span class="stat-badge" id="totalShots">📷 0 镜</span>
    <span class="stat-badge" id="totalDuration">⏱ 0s</span>
  </div>
</div>
<div class="ep-tabs" id="epTabs"></div>
<div class="scene-bar" id="sceneBar"></div>
<div class="content" id="content"></div>
<script>
const storyboard = [
  {
    ep: 1, title: '开场·悬念', color: '#e74c3c',
    scenes: [
      {
        id: '1-0', location: '日外/日内 · 多场景',
        desc: '开场蒙太奇——高光混剪定调。赛车场、修车店、别墅三场景快速穿插，旁白贯穿建立主角人设与故事走向。短剧标准"前三秒钩子"结构。',
        shots: [
          { id: 1, type: '全', typeTxt: '全景', cam: '推', camTxt: 'Push In', dur: 3, action: '夕阳赛车场，颁奖台矗立在画面中央。李乘风身穿龙魂战衣，头戴花环，高举冠军奖杯。观众席爆发出山呼海啸的掌声与欢呼。', dialog: '', notes: 'SFX: 引擎轰鸣+欢呼声混响' },
          { id: 2, type: '中', typeTxt: '中景', cam: '摇', camTxt: 'Pan', dur: 2, action: '记者群簇拥在颁奖台前，闪光灯交织成一片白幕。镜头从记者们激动的脸摇向台上的李乘风。', dialog: '', notes: '闪白特效转场' },
          { id: 3, type: '特', typeTxt: '特写', cam: '固定', camTxt: 'Fixed', dur: 2, action: '奖杯表面映出李乘风的倒影。金色奖杯上刻着冠军字样，边缘沾着香槟泡沫。', dialog: '', notes: '高速摄影 60fps' },
          { id: 4, type: '全', typeTxt: '全景', cam: '跟', camTxt: 'Follow', dur: 4, action: '赛道弯道。赤红色机车以极低倾角贴地切入弯心，火花从底盘擦出。车身紧贴地面，几乎水平滑过。', dialog: '', notes: '低机位跟拍 引擎声渐强' },
          { id: 5, type: '特', typeTxt: '特写', cam: '固定', camTxt: 'Fixed', dur: 2, action: '红色机车轮毂从黑色机车旁硬挤过去。两车间距不足一掌。', dialog: '', notes: 'GoPro车体视角' },
          { id: 6, type: '全', typeTxt: '全景', cam: '拉', camTxt: 'Pull Out', dur: 3, action: '黑色机车失控翻滚，在地面擦出长串火花后爆炸。火球升腾，浓烟滚滚。李乘风的红色机车从烟雾中冲出。', dialog: '', notes: 'VFX: 爆炸 音效: 巨大爆炸声' },
          { id: 7, type: '中', typeTxt: '中景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '修车店内。李乘风满手油污，欣慰地拍了拍修好的杜卡迪仿赛。', dialog: '', notes: '环境音：金属碰撞声' },
          { id: 8, type: '特', typeTxt: '特写', cam: '推', camTxt: 'Push In', dur: 2, action: '手机屏幕。赵天宇给李乘风转账三十万，到账通知弹出。', dialog: '', notes: 'UI动画 到账音效' },
          { id: 9, type: '近', typeTxt: '近景', cam: '摇', camTxt: 'Pan', dur: 2, action: '刘芒与辛瓦尔站在一旁，看到转账瞬间眼睛通红。刘芒咬牙切齿，辛瓦尔骂骂咧咧。镜头在两人之间摇移。', dialog: '', notes: '' },
          { id:10, type: '全', typeTxt: '全景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '别墅客厅大门被猛然撞开。三名保安气势汹汹冲进来。', dialog: '', notes: '快节奏音效' },
          { id:11, type: '中', typeTxt: '中景', cam: '手持', camTxt: 'Shake', dur: 2, action: '保安乙高举防爆叉当棍棒，狠狠打在李乘风后脑勺上。李乘风身体瞬间僵住。', dialog: '', notes: '音效：闷响 手持摇晃' },
          { id:12, type: '特', typeTxt: '特写', cam: '固定', camTxt: 'Fixed', dur: 2, action: '李乘风眼前一黑，身体直挺挺倒下。身穿居家服的付甜甜在旁白发出尖锐的惊叫。', dialog: '', notes: '黑屏闪切' },
          { id:13, type: '中', typeTxt: '中景', cam: '固定', camTxt: 'Fixed', dur: 3, action: '修车店工位。刘芒用手指一下下戳着蹲在地上修车的李乘风的后脑勺，嘴里骂骂咧咧。李乘风低着头沉默不语。', dialog: '李乘风VO: 我最要感谢的，还是克扣我修车款的表哥刘芒！', notes: '' },
        ]
      },
    ]
  },
  {
    ep: 2, title: '压榨·反转动力', color: '#2980b9',
    scenes: [
      {
        id: '1-1', location: '日内 · 修车店',
        desc: '李乘风成功修好友付的仿赛摩托，展现过硬技术。正要结账时接到小妹电话——母亲摔断腿住院了。急用钱。',
        shots: [
          { id: 1, type: '全', typeTxt: '全景', cam: '固定', camTxt: 'Fixed', dur: 3, action: '不算大的修车店，光线昏暗。李乘风满手油污蹲在一台改装仿赛旁，正把发动机装回，对准螺丝孔位。', dialog: '', notes: '环境音：扳手碰撞' },
          { id: 2, type: '中', typeTxt: '中景', cam: '推', camTxt: 'Push In', dur: 2, action: '付友站在一旁，表情从怀疑转为惊讶，低头看着发动机被装好。', dialog: '付友: 卧槽，你真修好了？我这车去了好几个地方都说没法修，得返原厂。', notes: '' },
          { id: 3, type: '近', typeTxt: '近景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '李乘风擦了一把额头的汗，露出微笑。从他的视角看到发动机安装完毕。', dialog: '李乘风: 付哥，我给您换了个点火线圈，ECU程序也重新刷了一遍。', notes: '' },
          { id: 4, type: '中', typeTxt: '中景', cam: '摇', camTxt: 'Pan', dur: 3, action: '付友兴奋地轻捶李乘风肩膀，掏出手机要扫码付钱。一旁老张咳嗽提醒，指了指里屋。', dialog: '付友: 牛啊兄弟！多少钱？你说个数我绝不还价。\n老张: 结账找我们老板。', notes: '' },
          { id: 5, type: '特', typeTxt: '特写', cam: '固定', camTxt: 'Fixed', dur: 2, action: '李乘风的手机屏幕亮起。来电显示：小妹李梅。他皱眉接起。', dialog: '', notes: '手机震动特效音' },
          { id: 6, type: '近', typeTxt: '近景', cam: '固定', camTxt: 'Fixed', dur: 3, action: '李乘风接电话，表情从平静变为震惊，猛然站起身。', dialog: '李梅VO（哭腔）: 哥……咱妈今天下地干活时……腿摔断了……\n李乘风: 什么？！', notes: '音效：心跳声渐强' },
        ]
      },
      {
        id: '1-2', location: '日内 · 修车店办公室',
        desc: '李乘风走进办公室找表哥（老板）刘芒结工钱。刘芒正盯着满屏绿色的股票交易界面。李乘风提出按当初说好的计件制结账，刘芒立刻翻脸否认。',
        shots: [
          { id: 1, type: '全', typeTxt: '全景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '李乘风推开办公室门走进去。刘芒跷着二郎腿坐在老板椅上盯着电脑屏幕。', dialog: '', notes: '' },
          { id: 2, type: '特', typeTxt: '特写', cam: '推', camTxt: 'Push In', dur: 3, action: '电脑屏幕特写——股票交易界面绿油油一片，大多数股票绿的，只有零星几支红色。', dialog: '', notes: '绿色光映在刘芒脸上' },
          { id: 3, type: '中', typeTxt: '中景', cam: '固定', camTxt: 'Fixed', dur: 3, action: '李乘风站在办公桌前，姿态有些拘谨但语气诚恳。', dialog: '李乘风: 表哥，我在店里干了快两个月了，想请你给结下这俩月的工钱。', notes: '' },
          { id: 4, type: '近', typeTxt: '近景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '刘芒头也不抬，漫不经心敷衍。', dialog: '刘芒: 急啥，月底再说，你不还没开学吗？', notes: '' },
          { id: 5, type: '特', typeTxt: '特写', cam: '固定', camTxt: 'Fixed', dur: 3, action: '李乘风咬紧牙关，喉结上下滚动。他压着情绪说话。', dialog: '李乘风: 表哥，我妈摔着了，粉碎性骨折。您之前说暑假计件，维修费三成归我。两个月三十多辆车……', notes: '音效：压抑的背景低音' },
          { id: 6, type: '近', typeTxt: '近景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '刘芒放下茶杯，瞪大眼睛，神态从漫不经心变成不耐烦。', dialog: '刘芒: 停停停，谁跟你说计件算钱了？', notes: '' },
        ]
      },
      {
        id: '2-1', location: '日内 · 修车店（闪回）',
        desc: '闪回——两个月前。刘芒跷着二郎腿傲慢地开出计件条件。李乘风欣喜接下。同一场景，李乘风修好了所有人都说修不了的仿赛摩托。',
        shots: [
          { id: 1, type: '全', typeTxt: '全景', cam: '固定', camTxt: 'Fixed', dur: 2, action: '[闪回] 办公室场景，画面略微泛黄。刘芒跷着二郎腿坐在老板椅上，一脸傲慢。', dialog: '刘芒: 想来我这里打工？成，但只能按计件，修一辆给你三成修理费。', notes: '闪回色调：偏黄 warmth' },

function render(){
  const epTabs=document.getElementById('epTabs');
  const sceneBar=document.getElementById('sceneBar');
  const content=document.getElementById('content');
  let totalShots=0,totalDuration=0;
  storyboard.forEach((ep,epIdx)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(epIdx===0?' active':'');
    tab.dataset.ep=epIdx;
    tab.innerHTML='<span class="dot" style="background:'+ep.color+'"></span>第'+ep.ep+'集 '+ep.title+' <span class="scene-count">'+ep.scenes.length+'场</span>';
    tab.addEventListener('click',()=>switchEpisode(epIdx));
    epTabs.appendChild(tab);
  });
  storyboard.forEach((ep,epIdx)=>{
    const epDiv=document.createElement('div');
    epDiv.className='episode'+(epIdx===0?' active':'');
    epDiv.dataset.ep=epIdx;
    ep.scenes.forEach((scene,sceneIdx)=>{
      const sceneDiv=document.createElement('div');
      sceneDiv.className='scene'+(sceneIdx===0?' active':'');
      sceneDiv.dataset.ep=epIdx;sceneDiv.dataset.scene=sceneIdx;
      const header=document.createElement('div');
      header.className='scene-header';
      header.style.borderColor=ep.color;
      header.innerHTML='<div class="scene-id">场 '+scene.id+'</div><div class="info"><span>📍 <span class="label">'+scene.location+'</span></span><span>📷 <span class="label">'+scene.shots.length+'镜</span></span><span>⏱ <span class="label">'+scene.shots.reduce((s,sh)=>s+sh.dur,0)+'s</span></span></div><div class="desc">'+scene.desc+'</div>';
      sceneDiv.appendChild(header);
      const table=document.createElement('table');
      table.className='shot-table';
      table.innerHTML='<thead><tr><th class="id">镜号</th><th class="type">景别</th><th class="cam">运镜</th><th class="dur">时长</th><th class="action">画面描述</th><th class="dialog">对白/旁白</th><th class="notes">备注</th></tr></thead><tbody></tbody>';
      const tbody=table.querySelector('tbody');
      scene.shots.forEach((shot)=>{
        const tr=document.createElement('tr');
        const typeClass=shot.type==='远'?'badge-ls':shot.type==='全'?'badge-fs':shot.type==='中'?'badge-ms':shot.type==='近'?'badge-mcu':shot.type==='特'?'badge-cu':'badge-ecu';
        const camClass=shot.cam==='固定'?'cam-fixed':shot.cam==='推'?'cam-push':shot.cam==='拉'?'cam-pull':shot.cam==='摇'?'cam-pan':shot.cam==='移'?'cam-track':shot.cam==='跟'?'cam-follow':shot.cam==='手持'?'cam-shake':'cam-steadicam';
        let dialogHtml='';
        if(shot.dialog){const lines=shot.dialog.split('\n');lines.forEach(line=>{if(line.includes('VO')||line.includes('OS')){dialogHtml+='<div class="vo">📻 '+line+'</div>';}else if(line.trim()){dialogHtml+='<div class="dialog">💬 '+line+'</div>';}});}
        let notesHtml='';
        if(shot.notes){notesHtml='<div class="notes">'+shot.notes+'</div>';}
        tr.innerHTML='<td class="id">'+shot.id+'</td><td class="type"><span class="badge '+typeClass+'">'+shot.typeTxt+'</span></td><td class="cam"><span class="cam-badge '+camClass+'">'+shot.camTxt+'</span></td><td class="dur">'+shot.dur+'s</td><td>'+shot.action+'</td><td>'+dialogHtml+'</td><td>'+notesHtml+'</td>';
        tbody.appendChild(tr);
        totalShots++;totalDuration+=shot.dur;
      });
      sceneDiv.appendChild(table);
      const sep=document.createElement('div');
      sep.className='scene-break';
      sep.textContent='◆　场 '+scene.id+' 结束　◆';
      sceneDiv.appendChild(sep);
      epDiv.appendChild(sceneDiv);
    });
    const epShots=ep.scenes.reduce((s,sc)=>s+sc.shots.length,0);
    const epDur=ep.scenes.reduce((s,sc)=>s+sc.shots.reduce((ss,sh)=>ss+sh.dur,0),0);
    const summary=document.createElement('div');
    summary.className='total-bar';
    const voText='第'+ep.ep+'集节奏说明。';
    summary.innerHTML='<div><strong>第'+ep.ep+'集</strong> · '+ep.title+'</div><div>📷 '+epShots+' 镜</div><div>⏱ 约 '+epDur+'s（'+(epDur/60).toFixed(1)+'分钟）</div>';
    epDiv.appendChild(summary);
    content.appendChild(epDiv);
  });
  buildSceneBar(0);
  document.getElementById('totalShots').innerHTML='📷 '+totalShots+' 镜';
  document.getElementById('totalDuration').innerHTML='⏱ '+totalDuration+'s（'+(totalDuration/60).toFixed(1)+'分钟）';
}
function switchEpisode(epIdx){
  document.querySelectorAll('.ep-tabs .tab').forEach((t,i)=>{t.classList.toggle('active',i===epIdx);t.style.borderColor=i===epIdx?storyboard[epIdx].color:'transparent';});
  document.querySelectorAll('.episode').forEach((ep,i)=>{ep.classList.toggle('active',i===epIdx);});
  buildSceneBar(epIdx);
  switchScene(epIdx,0);
}
function buildSceneBar(epIdx){
  const bar=document.getElementById('sceneBar');
  bar.innerHTML='';
  const ep=storyboard[epIdx];
  if(!ep)return;
  if(ep.scenes.length>1){
    bar.classList.add('visible');
    ep.scenes.forEach((scene,sceneIdx)=>{
      const btn=document.createElement('div');
      btn.className='scene-btn'+(sceneIdx===0?' active':'');
      btn.dataset.ep=epIdx;btn.dataset.scene=sceneIdx;
      btn.innerHTML='场'+scene.id+' <span class="loc">· '+scene.location.replace('·','')+'</span>';
      btn.addEventListener('click',()=>switchScene(epIdx,sceneIdx));
      bar.appendChild(btn);
    });
  }else{bar.classList.remove('visible');}
}
function switchScene(epIdx,sceneIdx){
  document.querySelectorAll('.episode[data-ep="'+epIdx+'"] .scene').forEach((s,i)=>{s.classList.toggle('active',i===sceneIdx);});
  document.querySelectorAll('.scene-bar .scene-btn').forEach((b,i)=>{b.classList.toggle('active',i===sceneIdx);});
  window.scrollTo({top:0,behavior:'smooth'});
}
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const activeEp=document.querySelector('.ep-tabs .tab.active');
    const epIdx=parseInt(activeEp?.dataset.ep)||0;
    const dir=e.key==='ArrowRight'?1:-1;
    const next=Math.max(0,Math.min(storyboard.length-1,epIdx+dir));
    if(next!==epIdx)switchEpisode(next);
  }
});
render();
</script>
</body>
</html>
