function r(){
  let ts=0,td=0;
  const sb=document.getElementById('sceneBar'),ct=document.getElementById('content');
  S.forEach((s,i)=>{const b=document.createElement('div');b.className='scene-btn'+(i===0?' active':'');b.dataset.scene=i;b.innerHTML='场'+s.id+' '+s.title;b.onclick=()=>sw(i);sb.appendChild(b);});
  S.forEach((s,si)=>{
    const sd=document.createElement('div');sd.className='scene';sd.style.display=si===0?'block':'none';
    if(s.beat){const bc=document.createElement('div');bc.className='beat-card';bc.innerHTML='<div class="title">'+s.title+' · 节奏要点</div><div class="desc">'+s.beat+'</div>';sd.appendChild(bc);}
    const h=document.createElement('div');h.className='scene-header';
    h.innerHTML='<div class="scene-id">场 '+s.id+' · '+s.title+'</div><div class="info"><span> <span class="label">'+s.loc+'</span></span><span> <span class="label">'+s.shots.length+' 镜</span></span><span> <span class="label">'+s.shots.reduce((a,b)=>a+b.dur,0)+'s</span></span></div><div class="desc">'+s.desc+'</div>';
    sd.appendChild(h);
    const t=document.createElement('table');t.className='shot-table';
    t.innerHTML='<thead><tr><th class="id">镜号</th><th class="type">景别</th><th class="cam">运镜</th><th class="dur">时长</th><th class="action">画面描述</th><th class="dialog">对白/旁白</th><th class="notes">备注</th></tr></thead><tbody></tbody>';
    const tb=t.querySelector('tbody');
    s.shots.forEach((sh)=>{
      const tr=document.createElement('tr');
      let dh='',nh='';
      if(sh.d){const ls=sh.d.split('<br>');ls.forEach(l=>{if(l.includes('VO'))dh+='<div class="vo"> '+l+'</div>';else if(l.trim())dh+='<div class="dialog"> '+l+'</div>';});}
      if(sh.n){nh='<div class="'+(sh.n.includes('SFX')||sh.n.includes('音效')?'sfx':'notes')+'">'+sh.n+'</div>';}
      tr.innerHTML='<td class="id">'+sh.id+'</td><td class="type"><span class="badge badge-'+sh.type+'">'+sh.type+'</span></td><td class="cam"><span class="cam-badge cam-'+sh.cam+'">'+sh.cam+'</span></td><td class="dur"><span class="dur-badge">'+sh.dur+'s</span></td><td>'+sh.a+'</td><td>'+dh+'</td><td>'+nh+'</td>';
      tb.appendChild(tr);ts++;td+=sh.dur;
    });
    sd.appendChild(t);
    const sp=document.createElement('div');sp.className='scene-break';sp.textContent='◆ 场 '+s.id+' 结束 ◆';sd.appendChild(sp);
    ct.appendChild(sd);
  });
  const tb=document.createElement('div');tb.className='total-bar';
  tb.innerHTML='<div><strong>本集总计</strong></div><div> '+ts+' 镜</div><div class="divider">|</div><div>约 <strong>'+td+'s</strong>（'+(td/60).toFixed(1)+' 分钟）</div><div class="divider">|</div><div> '+S.length+' 场戏</div>';
  ct.appendChild(tb);
  document.getElementById('totalShots').innerHTML=' '+ts+' 镜';
  document.getElementById('totalDuration').innerHTML=' '+td+'s（'+(td/60).toFixed(1)+' 分钟）';
}
function sw(i){
  document.querySelectorAll('.scene').forEach((s,j)=>{s.style.display=j===i?'block':'none';});
  document.querySelectorAll('.scene-btn').forEach((b,j)=>{b.classList.toggle('active',j===i);});
  window.scrollTo({top:0,behavior:'smooth'});
}
document.addEventListener('keydown',(e)=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const a=document.querySelector('.scene-btn.active');
    const ci=parseInt(a?.dataset.scene)||0;
    const d=e.key==='ArrowRight'?1:-1;
    const ni=Math.max(0,Math.min(S.length-1,ci+d));
    if(ni!==ci)sw(ni);
  }
});
r();
</script>
